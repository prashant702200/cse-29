    <script>
        

        function CHECK (){
            var a = parseInt(document.getElementById("n1").value)
            var b = parseInt(document.getElementById("n2").value)
            var c = parseInt(document.getElementById("n3").value)
            var total = (a+b+c);
            var per = (total*100/300);
            document.write("ham kahat rahni total :", total , "<br>")
            document.write("ham kahat rahni per :",per);
        }


    </script>
    <h1>CHECK YOUR RESULT </h1>
    <div class="cont">
    <form>

        sub 1: <input type="text" id="n1">
         sub 2: <input type="text" id="n2">
          sub 3: <input type="text" id="n3">
          <button class="button" onclick="CHECK()">CHECK RESULT</button>
    </form>
    </div>
